<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem 1rem;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input[type="text"]:focus {
      outline: 2px solid #4f6ef7;
      outline-offset: 1px;
    }

    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover { background: #3a58e0; }

    ul#habit-list {
      list-style: none;
    }

    .habit-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      margin-bottom: 0.5rem;
    }

    .habit-item.done {
      background: #f0fdf4;
      border-color: #86efac;
    }

    .habit-item .check-btn {
      width: 1.5rem;
      height: 1.5rem;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid #ccc;
      background: #fff;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }

    .habit-item.done .check-btn {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }

    .habit-item.done .check-btn:hover { background: #16a34a; border-color: #16a34a; }
    .habit-item:not(.done) .check-btn:hover { border-color: #22c55e; }

    .habit-item span {
      flex: 1;
      font-size: 1rem;
    }

    .habit-item.done span {
      color: #6b7280;
      text-decoration: line-through;
    }

    .delete-btn {
      padding: 0.25rem 0.6rem;
      font-size: 0.85rem;
      background: #e55;
      border-radius: 4px;
    }

    .delete-btn:hover { background: #c33; }
  </style>
</head>
<body>
  <div id="app">
    <h1>Habit Tracker</h1>
    <form id="add-form">
      <input type="text" id="habit-input" placeholder="Add a habit…" autocomplete="off" />
      <button type="submit">Add</button>
    </form>
    <ul id="habit-list"></ul>
  </div>
  <script>
    const STORAGE_KEY = 'habits';
    const COMPLETIONS_KEY = 'completions';
    const form = document.getElementById('add-form');
    const input = document.getElementById('habit-input');
    const list = document.getElementById('habit-list');

    const today = () => new Date().toISOString().slice(0, 10);

    const loadHabits = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const saveHabits = habits => localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));

    const loadCompletions = () => JSON.parse(localStorage.getItem(COMPLETIONS_KEY) || '{}');
    const saveCompletions = c => localStorage.setItem(COMPLETIONS_KEY, JSON.stringify(c));

    const toggleCompletion = id => {
      const c = loadCompletions();
      const key = `${id}:${today()}`;
      if (c[key]) delete c[key]; else c[key] = true;
      saveCompletions(c);
      renderHabits();
    };

    const renderHabits = () => {
      const habits = loadHabits();
      const c = loadCompletions();
      list.innerHTML = '';
      habits.forEach(({ id, name }) => {
        const done = !!c[`${id}:${today()}`];
        const li = document.createElement('li');
        li.className = `habit-item${done ? ' done' : ''}`;
        li.innerHTML = `
          <button class="check-btn" data-id="${id}" aria-label="${done ? 'Unmark' : 'Mark'} ${name} done">
            ${done ? '✓' : ''}
          </button>
          <span>${name}</span>
          <button class="delete-btn" data-id="${id}">Delete</button>
        `;
        list.appendChild(li);
      });
    };

    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = input.value.trim();
      if (!name) return;
      const habits = loadHabits();
      habits.push({ id: Date.now(), name });
      saveHabits(habits);
      input.value = '';
      renderHabits();
    });

    list.addEventListener('click', e => {
      const checkBtn = e.target.closest('.check-btn');
      if (checkBtn) { toggleCompletion(Number(checkBtn.dataset.id)); return; }

      const deleteBtn = e.target.closest('.delete-btn');
      if (deleteBtn) {
        const id = Number(deleteBtn.dataset.id);
        saveHabits(loadHabits().filter(h => h.id !== id));
        renderHabits();
      }
    });

    renderHabits();
  </script>
</body>
</html>
