<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem 1rem;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input[type="text"]:focus {
      outline: 2px solid #4f6ef7;
      outline-offset: 1px;
    }

    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover { background: #3a58e0; }

    ul#habit-list {
      list-style: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Habit Tracker</h1>
    <form id="add-form">
      <input type="text" id="habit-input" placeholder="Add a habit…" autocomplete="off" />
      <button type="submit">Add</button>
    </form>
    <ul id="habit-list"></ul>
  </div>
  <script>
    // TODO: load and render habits
  </script>
</body>
</html>
